<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="90" fill="#3a9b4f"/>
  <!-- Scorecard -->
  <rect x="80" y="90" width="180" height="210" rx="15" fill="#1a1a1a" opacity="0.85"/>
  <!-- Checkmark -->
  <polyline points="110,155 130,175 165,135" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Lines on scorecard -->
  <line x1="115" y1="205" x2="230" y2="205" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="115" y1="240" x2="200" y2="240" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <!-- Golf ball -->
  <circle cx="210" cy="310" r="75" fill="#1a1a1a" opacity="0.85"/>
  <circle cx="210" cy="310" r="65" fill="#1a1a1a"/>
  <!-- Ball dimples -->
  <circle cx="210" cy="310" r="6" fill="#3a9b4f"/>
  <circle cx="185" cy="295" r="5" fill="#3a9b4f"/>
  <circle cx="235" cy="295" r="5" fill="#3a9b4f"/>
  <circle cx="185" cy="325" r="5" fill="#3a9b4f"/>
  <circle cx="235" cy="325" r="5" fill="#3a9b4f"/>
  <circle cx="210" cy="280" r="5" fill="#3a9b4f"/>
  <circle cx="210" cy="340" r="5" fill="#3a9b4f"/>
  <circle cx="170" cy="310" r="5" fill="#3a9b4f"/>
  <circle cx="250" cy="310" r="5" fill="#3a9b4f"/>
  <!-- Flag pole -->
  <line x1="355" y1="100" x2="355" y2="370" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
  <!-- Flag -->
  <polygon points="355,100 430,135 355,170" fill="#1a1a1a"/>
  <!-- Green/hole -->
  <ellipse cx="370" cy="385" rx="80" ry="30" fill="#1a1a1a" opacity="0.85"/>
  <ellipse cx="355" cy="380" rx="20" ry="8" fill="#3a9b4f"/>
</svg>
